name: Clean

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  animations:
    name: Animation files

    permissions:
      pull-requests: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Get changed animations
        id: changed-animations
        uses: tj-actions/changed-files@v47
        with:
          files: |
            animations/**/*.json

      - name: Install packages
        if: steps.changed-animations.outputs.any_changed == 'true'
        run: npm install

      - name: Clean Format with Prettier
        if: steps.changed-animations.outputs.any_changed == 'true'
        run: |
          npx prettier --write ${{ steps.changed-animations.outputs.all_changed_files }}
